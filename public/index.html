<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Portal del Estudiante — Talk English Academy</title>
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Work Sans',sans-serif;min-height:100vh;background:linear-gradient(145deg,#0F145B 0%,#283A97 55%,#4789C8 100%);display:flex;align-items:center;justify-content:center;padding:24px}
  .card{background:#fff;border-radius:20px;padding:44px 40px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(15,20,91,0.3);text-align:center}
  .logo-sym{display:inline-flex;align-items:center;justify-content:center;width:56px;height:56px;background:#EA0029;border-radius:14px;font-size:32px;font-weight:700;color:#fff;margin-bottom:10px}
  .logo-name{display:block;font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:#0F145B;margin-bottom:28px}
  h1{font-size:22px;font-weight:700;color:#0F145B;margin-bottom:6px}
  .sub{font-size:13px;color:#6b7280;margin-bottom:32px;line-height:1.6}
  .field{text-align:left;margin-bottom:18px}
  .field label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:#0F145B;margin-bottom:7px}
  .field input{width:100%;padding:12px 16px;border:1.5px solid #e2e6f0;border-radius:10px;font-size:14px;font-family:'Work Sans',sans-serif;outline:none;transition:border-color 0.2s;color:#0F145B}
  .field input:focus{border-color:#283A97}
  .btn{width:100%;background:#EA0029;color:#fff;border:none;border-radius:10px;padding:14px;font-size:14px;font-weight:700;font-family:'Work Sans',sans-serif;cursor:pointer;letter-spacing:0.5px;text-transform:uppercase;transition:background 0.2s}
  .btn:hover{background:#c8001f}
  .btn:disabled{background:#ccc;cursor:not-allowed}
  .nota{margin-top:22px;font-size:12px;color:#aaa;line-height:1.7}
  .tag{display:inline-block;background:#e8f4ea;color:#2a7a3a;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;margin-top:6px}
  .err{background:#fde8e8;color:#a32d2d;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:16px;display:none;text-align:left}
</style>
</head>
<body>
<div class="card">
  <div class="logo-sym">T</div>
  <span class="logo-name">Talk English Academy</span>
  <h1>Portal del Estudiante</h1>
  <p class="sub">Acceso exclusivo para estudiantes inscritos en el Programa de Mentoring 1:1</p>
  <div id="err" class="err"></div>
  <div class="field">
    <label>Correo electrónico</label>
    <input type="email" id="email" placeholder="tu@email.com" autocomplete="email"/>
  </div>
  <div class="field">
    <label>Contraseña</label>
    <input type="password" id="pass" placeholder="••••••••" autocomplete="current-password"/>
  </div>
  <button class="btn" id="btn" onclick="doLogin()">Ingresar al Portal</button>
  <div class="nota">
    Solo pueden acceder estudiantes verificados con el tag<br>
    <span class="tag">TEA-Student ✓</span>
  </div>
</div>
<script>
  var API = 'https://tea-portal-bice.vercel.app/api/tea';

  document.addEventListener('keydown', function(e){
    if(e.key==='Enter') doLogin();
  });

  async function doLogin(){
    var email = document.getElementById('email').value.trim();
    var pass  = document.getElementById('pass').value.trim();
    var err   = document.getElementById('err');
    var btn   = document.getElementById('btn');
    err.style.display='none';

    if(!email||!pass){
      err.textContent='Por favor ingresa tu correo y contraseña.';
      err.style.display='block'; return;
    }

    btn.disabled=true; btn.textContent='Verificando...';

    try{
      var res  = await fetch(API+'?action=login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password:pass})});
      var data = await res.json();

      if(!data.ok){
        var msgs={NO_STUDENT:'No encontramos una cuenta con ese correo.',NO_TAG:'Tu cuenta aún no tiene acceso al portal. Contacta a TEA por WhatsApp.',WRONG_PASS:'Contraseña incorrecta. Si es tu primer acceso, usa los últimos 4 dígitos de tu teléfono.'};
        err.textContent=msgs[data.error]||'Error al iniciar sesión.';
        err.style.display='block'; return;
      }

      // Guardar datos del estudiante en sessionStorage
      sessionStorage.setItem('tea_student', JSON.stringify(data.student));

      // Redirigir según estado
      if(data.student.yaAsignado){
        window.location.href='dashboard.html';
      } else {
        window.location.href='onboarding.html';
      }
    } catch(e){
      err.textContent='Error de conexión. Intenta de nuevo.';
      err.style.display='block';
    } finally{
      btn.disabled=false; btn.textContent='Ingresar al Portal';
    }
  }
</script>
</body>
</html>
