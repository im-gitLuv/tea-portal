<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Panel Operador — TEA Help Desk</title>
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:'Work Sans',sans-serif;background:#f0f2f8;color:#1a1a2e}
:root{
  --azul:#283A97;--azul-o:#0F145B;--rojo:#EA0029;
  --light-blue:#4789C8;--gris:#BBBBBB;
  --borde:#e2e6f0;--suave:#6b7280;
  --radio:12px;--sombra:0 2px 16px rgba(15,20,91,.09);
  --panel-w:380px;
}

/* ── LAYOUT ─────────────────────────────────────────────────────── */
.shell{display:flex;height:100vh;overflow:hidden}

/* ── SIDEBAR IZQUIERDO ──────────────────────────────────────────── */
.sidebar{
  width:var(--panel-w);flex-shrink:0;
  background:#fff;border-right:1px solid var(--borde);
  display:flex;flex-direction:column;height:100vh;
}
.sb-head{
  background:var(--azul-o);padding:18px 20px;
  display:flex;align-items:center;gap:12px;flex-shrink:0;
}
.sb-logo{height:38px;width:auto;object-fit:contain}
.sb-title{color:#fff;font-size:13px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;line-height:1.3}
.sb-title span{color:var(--rojo)}
.sb-badge{background:var(--rojo);color:#fff;font-size:9px;font-weight:800;padding:2px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.8px;margin-left:auto;flex-shrink:0}

/* Filtros */
.sb-filters{padding:16px;flex-shrink:0;border-bottom:1px solid var(--borde);display:flex;flex-direction:column;gap:10px}
.search-wrap{position:relative}
.search-wrap input{
  width:100%;padding:9px 12px 9px 36px;
  border:1.5px solid var(--borde);border-radius:9px;
  font-size:13px;font-family:inherit;color:var(--azul-o);outline:none;
  transition:border-color .2s;background:#f8f9fe;
}
.search-wrap input:focus{border-color:var(--azul);background:#fff}
.search-wrap .si{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:15px;color:var(--suave)}
.filter-row{display:flex;gap:8px}
.filter-row select{
  flex:1;padding:8px 10px;border:1.5px solid var(--borde);border-radius:9px;
  font-size:12px;font-family:inherit;color:var(--azul-o);outline:none;background:#f8f9fe;
  transition:border-color .2s;cursor:pointer;
}
.filter-row select:focus{border-color:var(--azul)}

/* Lista de tickets */
.sb-list{flex:1;overflow-y:auto;padding:8px 0}
.sb-list::-webkit-scrollbar{width:4px}
.sb-list::-webkit-scrollbar-track{background:transparent}
.sb-list::-webkit-scrollbar-thumb{background:#dde3f0;border-radius:4px}

.tk-item{
  padding:14px 18px;cursor:pointer;border-bottom:1px solid #f5f7fc;
  transition:background .15s;position:relative;
}
.tk-item:hover{background:#f5f7fc}
.tk-item.active{background:#eef1fb;border-left:3px solid var(--azul)}
.tk-item.active .tk-tema{color:var(--azul)}
.tk-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.tk-nombre{font-size:12px;font-weight:700;color:var(--azul-o)}
.tk-fecha{font-size:10px;color:var(--suave)}
.tk-tema{font-size:13px;font-weight:600;color:#1a1a2e;margin-bottom:4px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:280px}
.tk-footer{display:flex;align-items:center;gap:6px}
.tk-status{font-size:9px;font-weight:800;padding:2px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.5px}
.ts-abierto{background:#fde8e8;color:#a32d2d}
.ts-pendiente{background:#fff3cd;color:#856404}
.ts-respondido{background:#e8f4ea;color:#2a7a3a}
.ts-cerrado{background:#f0f0f0;color:#666}
.tk-tipo{font-size:10px;color:var(--suave)}

.sb-empty{padding:40px 20px;text-align:center;color:var(--suave);font-size:13px}
.sb-loader{padding:40px 20px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px}

/* Contador */
.sb-count{padding:8px 18px;font-size:11px;color:var(--suave);border-bottom:1px solid var(--borde);flex-shrink:0}
.sb-count strong{color:var(--azul-o)}

/* ── PANEL PRINCIPAL (chat) ─────────────────────────────────────── */
.main{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;background:#f0f2f8}
#main-ticket{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}

/* Estado vacío */
.main-empty{
  flex:1;display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:16px;
}
.main-empty-icon{font-size:56px;opacity:.3}
.main-empty-txt{font-size:15px;color:var(--suave);font-weight:500}

/* Cabecera del ticket abierto */
.chat-head{
  background:#fff;border-bottom:1px solid var(--borde);
  padding:14px 24px;display:flex;align-items:center;gap:16px;flex-shrink:0;
}
.chat-head-info{flex:1;min-width:0}
.chat-head-tema{font-size:16px;font-weight:700;color:var(--azul-o);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chat-head-sub{font-size:12px;color:var(--suave);margin-top:2px}
.chat-head-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}

/* Estado selector inline */
.estado-sel{
  padding:6px 12px;border:1.5px solid var(--borde);border-radius:8px;
  font-size:12px;font-weight:700;font-family:inherit;outline:none;cursor:pointer;
  transition:border-color .2s;background:#f8f9fe;color:var(--azul-o);
}
.estado-sel:focus{border-color:var(--azul)}

/* Hilo de mensajes */
.chat-hilo{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:12px}
.chat-hilo::-webkit-scrollbar{width:5px}
.chat-hilo::-webkit-scrollbar-thumb{background:#dde3f0;border-radius:4px}

.msg-burbuja{max-width:80%;padding:12px 16px;border-radius:12px;font-size:14px;line-height:1.6}
.msg-tea{
  background:#fff;border:1px solid var(--borde);border-radius:12px 12px 12px 2px;
  box-shadow:var(--sombra);align-self:flex-start;
}
.msg-estudiante{
  background:var(--azul-o);color:#fff;border-radius:12px 12px 2px 12px;
  align-self:flex-end;
}
.msg-estudiante .msg-autor{color:rgba(255,255,255,.6)}
.msg-tea .msg-autor{color:var(--light-blue)}
.msg-autor{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;display:block}
.msg-rich{font-size:13px;line-height:1.7}
.msg-rich p{margin:0 0 4px}.msg-rich p:last-child{margin:0}
.msg-rich strong{font-weight:700}
.msg-rich em{font-style:italic}
.msg-rich u{text-decoration:underline}
.msg-rich s{text-decoration:line-through}
.msg-rich ul,.msg-rich ol{margin:4px 0 4px 18px}
.msg-rich li{margin-bottom:2px}
.msg-rich pre{background:#1e1e2e;color:#cdd6f4;border-radius:8px;padding:10px 12px;font-size:11px;font-family:monospace;overflow-x:auto;margin:6px 0}
.msg-rich code{background:rgba(40,58,151,.12);color:#283A97;padding:1px 5px;border-radius:4px;font-size:11px;font-family:monospace}
.msg-rich blockquote{border-left:3px solid var(--light-blue);padding:4px 10px;background:rgba(71,137,200,.08);margin:4px 0;border-radius:0 6px 6px 0;font-style:italic}
.msg-rich a{color:#4789C8;text-decoration:underline}
.msg-rich img{max-width:100%;border-radius:6px;margin:4px 0;display:block}
.msg-estudiante .msg-rich a{color:#aaccff}
.msg-estudiante .msg-rich code{background:rgba(255,255,255,.15);color:#fff}
.msg-estudiante .msg-rich blockquote{border-left-color:rgba(255,255,255,.4);background:rgba(255,255,255,.08)}

/* Adjuntos en burbujas */
.adj-wrap{margin-top:8px;display:flex;flex-wrap:wrap;gap:6px}
.adj-chip{display:flex;align-items:center;gap:5px;border-radius:7px;padding:5px 10px;text-decoration:none;font-size:11px;font-weight:600;transition:opacity .2s;max-width:180px}
.adj-chip:hover{opacity:.8}
.adj-chip-tea{background:rgba(40,58,151,.08);border:1px solid rgba(40,58,151,.15);color:#283A97}
.adj-chip-est{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);color:#fff}
.adj-img-prev{max-width:160px;max-height:120px;object-fit:cover;border-radius:7px;display:block;margin-top:6px;cursor:pointer}
.adj-nombre{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Area de respuesta operador */
.chat-reply{
  background:#fff;border-top:1px solid var(--borde);
  padding:16px 24px 20px;flex-shrink:0;
  max-height:55vh;overflow-y:auto;
}
.chat-reply::-webkit-scrollbar{width:4px}
.chat-reply::-webkit-scrollbar-thumb{background:#dde3f0;border-radius:4px}
.reply-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--azul-o);margin-bottom:8px}

/* Quill custom */
.ql-toolbar.ql-snow{border:1.5px solid var(--borde);border-bottom:none;border-radius:10px 10px 0 0;background:#f8f9fe;padding:7px 10px;font-family:'Work Sans',sans-serif}
.ql-container.ql-snow{border:1.5px solid var(--borde);border-top:none;border-radius:0 0 10px 10px;font-family:'Work Sans',sans-serif;font-size:13px;color:var(--azul-o);max-height:120px;overflow-y:auto}
.ql-editor{min-height:60px;max-height:120px;padding:10px 12px;line-height:1.6}
.ql-editor.ql-blank::before{color:#9ca3af;font-style:normal;font-size:13px}
.ql-snow .ql-stroke{stroke:#283A97}.ql-snow .ql-fill{fill:#283A97}.ql-snow .ql-picker{color:#283A97}
.ql-snow.ql-toolbar button:hover .ql-stroke,.ql-snow.ql-toolbar button.ql-active .ql-stroke{stroke:#EA0029}
.ql-snow.ql-toolbar button:hover .ql-fill,.ql-snow.ql-toolbar button.ql-active .ql-fill{fill:#EA0029}

/* Adjuntos zona editor */
.adj-zona{border:1.5px dashed var(--borde);border-radius:9px;padding:8px 12px;background:#f8f9fe;display:flex;align-items:center;gap:8px;cursor:pointer;transition:border-color .2s;margin-top:8px}
.adj-zona:hover{border-color:var(--azul)}
.adj-zona-txt{font-size:11px;color:var(--suave)}
.adj-prev-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.adj-prev-item{display:flex;align-items:center;gap:5px;background:#eef1fb;border-radius:6px;padding:4px 8px;font-size:11px;color:#283A97;font-weight:600}
.adj-prev-item button{background:none;border:none;cursor:pointer;color:var(--rojo);font-size:12px;padding:0;line-height:1;margin-left:2px}

/* Botones */
.btn-send{background:var(--rojo);color:#fff;border:none;border-radius:9px;padding:10px 20px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;transition:background .2s;white-space:nowrap}
.btn-send:hover{background:#c8001f}
.btn-send:disabled{background:#ccc;cursor:not-allowed}
.reply-row{display:flex;gap:8px;align-items:center;margin-top:10px;flex-wrap:wrap}
.reply-msg{font-size:12px;padding:6px 10px;border-radius:7px;display:none}
.reply-ok{background:#e8f4ea;color:#1a5c28}
.reply-err{background:#fde8e8;color:#a32d2d}

/* Cerrado banner */
.cerrado-banner{background:#f4f6fb;border-radius:9px;padding:10px 14px;font-size:13px;color:var(--suave);text-align:center;margin-top:8px}

/* Loaders */
.spinner{width:28px;height:28px;border:3px solid var(--borde);border-top-color:var(--azul);border-radius:50%;animation:spin .7s linear infinite}
.spinner-sm{width:18px;height:18px;border-width:2px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Responsive mínimo */
@media(max-width:700px){
  .sidebar{width:100%;position:fixed;z-index:100;transform:translateX(-100%);transition:transform .3s}
  .sidebar.open{transform:translateX(0)}
  .mob-toggle{display:flex!important}
}
.mob-toggle{display:none;background:none;border:none;cursor:pointer;padding:8px;color:#fff;font-size:20px;flex-shrink:0}

/* ── FUNNELUP ESCAPE: overlay fijo que cubre todo el viewport ── */
#tea-app-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  z-index: 99999;
  background: #f0f2f8;
  overflow: hidden;
}
#tea-app-overlay .shell {
  height: 100vh;
}
</style>
</head>
<body>

<div id="tea-app-overlay"><div class="shell">

  <!-- ── SIDEBAR: lista de tickets ──────────────────────────────────────── -->
  <aside class="sidebar" id="sidebar">
    <div class="sb-head">
      <img class="sb-logo" src="https://assets.cdn.filesafe.space/9cXtL7yJiTR3U0C2xmDt/media/69fd35c8a3dd25aa2a764cc8.png" alt="TEA"/>
      <div class="sb-title"><span>TALK</span> ENGLISH ACADEMY<br/>Help Desk — Panel</div>
      <div class="sb-badge">Operador</div>
    </div>

    <div class="sb-filters">
      <div class="search-wrap">
        <span class="si">🔍</span>
        <input type="text" id="buscar" placeholder="Buscar por nombre, tema o email…" oninput="filtrar()"/>
      </div>
      <div class="filter-row">
        <select id="f-estado" onchange="filtrar()">
          <option value="Todos">Todos los estados</option>
          <option value="Abierto">Abierto</option>
          <option value="Pendiente">Pendiente</option>
          <option value="Respondido">Respondido</option>
          <option value="Cerrado">Cerrado</option>
        </select>
        <select id="f-tipo" onchange="filtrar()">
          <option value="Todos">Todos los tipos</option>
          <option value="Pregunta">Pregunta</option>
          <option value="Problema técnico">Problema técnico</option>
          <option value="Incidente">Incidente</option>
          <option value="Sugerencia">Sugerencia</option>
        </select>
      </div>
    </div>

    <div class="sb-count" id="sb-count"><strong>—</strong> tickets</div>
    <div class="sb-list" id="sb-list">
      <div class="sb-loader"><div class="spinner"></div><span style="font-size:12px;color:var(--suave)">Cargando tickets...</span></div>
    </div>
  </aside>

  <!-- ── PANEL PRINCIPAL ────────────────────────────────────────────────── -->
  <main class="main" id="main">

    <!-- Estado vacío inicial -->
    <div class="main-empty" id="main-empty">
      <div class="main-empty-icon">🎫</div>
      <div class="main-empty-txt">Selecciona un ticket para ver el chat</div>
    </div>

    <!-- Vista de ticket activo -->
    <div id="main-ticket" style="display:none">

      <!-- Cabecera -->
      <div class="chat-head">
        <button class="mob-toggle" id="mob-back" onclick="cerrarMobile()">←</button>
        <div class="chat-head-info">
          <div class="chat-head-tema" id="ch-tema">—</div>
          <div class="chat-head-sub" id="ch-sub">—</div>
        </div>
        <div class="chat-head-actions">
          <select class="estado-sel" id="estado-sel" onchange="cambiarEstado(this.value)">
            <option value="Abierto">🔴 Abierto</option>
            <option value="Pendiente">🟡 Pendiente</option>
            <option value="Respondido">🟢 Respondido</option>
            <option value="Cerrado">⚫ Cerrado</option>
          </select>
        </div>
      </div>

      <!-- Hilo de mensajes -->
      <div class="chat-hilo" id="chat-hilo">
        <div style="display:flex;align-items:center;justify-content:center;padding:40px">
          <div class="spinner"></div>
        </div>
      </div>

      <!-- Área de respuesta -->
      <div class="chat-reply" id="chat-reply">
        <div class="reply-label">Respuesta de TEA</div>
        <div id="quill-admin"></div>
        <div class="adj-zona" onclick="document.getElementById('adj-admin-input').click()">
          <span style="font-size:17px">📎</span>
          <span class="adj-zona-txt">Adjuntar archivos (máx. 5 · 10 MB c/u)</span>
        </div>
        <input type="file" id="adj-admin-input" multiple style="display:none" accept="*/*"/>
        <div class="adj-prev-list" id="adj-admin-list"></div>
        <div class="reply-row">
          <button class="btn-send" id="btn-send" onclick="enviarRespuesta()">Enviar respuesta</button>
          <div class="reply-msg reply-ok" id="rep-ok">✓ Respuesta enviada al estudiante.</div>
          <div class="reply-msg reply-err" id="rep-err"></div>
        </div>
        <div class="cerrado-banner" id="cerrado-banner" style="display:none">Este ticket está cerrado. No se pueden enviar más respuestas.</div>
      </div>

    </div>
  </main>
</div>

<script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
<script>
var API = 'https://tea-portal-bice.vercel.app/api/tea';
var CLOUDINARY_CLOUD  = 'dyq5lleye';
var CLOUDINARY_PRESET = 'tea_helpdesk';

var todosTickets = [];
var ticketActual = null;
var quillAdmin   = null;
var adjuntos     = [];

// ── INIT ──────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
  iniciarQuill();
  document.getElementById('adj-admin-input').addEventListener('change', function(e){
    agregarAdj(e.target.files); this.value = '';
  });
  // Si la URL tiene un hash (ticketId), abrir ese ticket al cargar
  cargarTickets().then(function() {
    var hash = window.location.hash.replace('#', '').trim();
    if (hash) abrirTicket(hash);
  });
});

// ── QUILL ─────────────────────────────────────────────────────────────────────
function iniciarQuill() {
  quillAdmin = new Quill('#quill-admin', {
    theme: 'snow',
    placeholder: 'Escribe tu respuesta para el estudiante...',
    modules: { toolbar: [
      ['bold','italic','underline','strike'],
      [{'list':'ordered'},{'list':'bullet'}],
      ['blockquote','code-block'],
      ['link'],
      ['clean']
    ]}
  });
}

// ── CARGAR TICKETS ────────────────────────────────────────────────────────────
async function cargarTickets() {
  try {
    var res  = await fetch(API + '?action=admin_tickets');
    var data = await res.json();
    if (!data.ok) throw new Error(data.error);
    todosTickets = data.tickets;
    renderLista(todosTickets);
  } catch(e) {
    document.getElementById('sb-list').innerHTML =
      '<div style="padding:20px;color:#a32d2d;font-size:13px">Error al cargar: ' + e.message + '</div>';
  }
}
// ── FILTRAR ───────────────────────────────────────────────────────────────────
function filtrar() {
  var buscar  = document.getElementById('buscar').value.trim().toLowerCase();
  var estado  = document.getElementById('f-estado').value;
  var tipo    = document.getElementById('f-tipo').value;

  var filtrados = todosTickets.filter(function(t) {
    var ok = true;
    if (estado !== 'Todos' && t.estado !== estado) ok = false;
    if (tipo   !== 'Todos' && t.tipo   !== tipo)   ok = false;
    if (buscar && !(
      t.nombre.toLowerCase().includes(buscar) ||
      t.tema.toLowerCase().includes(buscar)   ||
      t.email.toLowerCase().includes(buscar)
    )) ok = false;
    return ok;
  });
  renderLista(filtrados);
}

// ── RENDER LISTA ──────────────────────────────────────────────────────────────
var SC = {Abierto:'ts-abierto',Pendiente:'ts-pendiente',Respondido:'ts-respondido',Cerrado:'ts-cerrado'};

function renderLista(lista) {
  var el = document.getElementById('sb-list');
  document.getElementById('sb-count').innerHTML = '<strong>' + lista.length + '</strong> ticket' + (lista.length!==1?'s':'');

  if (!lista.length) {
    el.innerHTML = '<div class="sb-empty">No hay tickets con esos filtros.</div>';
    return;
  }

  el.innerHTML = lista.map(function(t, i) {
    var sc = SC[t.estado] || 'ts-abierto';
    var activo = ticketActual && ticketActual.id === t.id ? 'active' : '';
    return '<div class="tk-item ' + activo + '" onclick="abrirTicket(\'' + t.id + '\')" id="ti-' + t.id + '">' +
      '<div class="tk-meta">' +
        '<span class="tk-nombre">' + esc(t.nombre) + '</span>' +
        '<span class="tk-fecha">' + esc(t.fecha) + '</span>' +
      '</div>' +
      '<div class="tk-tema">' + esc(t.tema) + '</div>' +
      '<div class="tk-footer">' +
        '<span class="tk-status ' + sc + '">' + t.estado + '</span>' +
        '<span class="tk-tipo">· ' + esc(t.tipo) + '</span>' +
      '</div>' +
    '</div>';
  }).join('');
}

// ── ABRIR TICKET ──────────────────────────────────────────────────────────────
async function abrirTicket(id) {
  ticketActual = todosTickets.find(function(t){ return t.id === id; });
  if (!ticketActual) return;

  // Resaltar en lista
  document.querySelectorAll('.tk-item').forEach(function(el){ el.classList.remove('active'); });
  var ti = document.getElementById('ti-' + id);
  if (ti) ti.classList.add('active');

  // Mostrar panel
  document.getElementById('main-empty').style.display  = 'none';
  document.getElementById('main-ticket').style.display = 'flex';

  // Cabecera
  document.getElementById('ch-tema').textContent = ticketActual.tema;
  document.getElementById('ch-sub').textContent  =
    ticketActual.nombre + ' · ' + ticketActual.email + ' · ' + ticketActual.tipo;
  document.getElementById('estado-sel').value = ticketActual.estado;

  // Reply area según estado
  actualizarAreaReply(ticketActual.estado);

  // Cargar mensajes
  document.getElementById('chat-hilo').innerHTML =
    '<div style="display:flex;align-items:center;justify-content:center;padding:40px"><div class="spinner"></div></div>';

  try {
    var res  = await fetch(API + '?action=helpdesk_mensajes&ticketId=' + id);
    var data = await res.json();
    renderHilo(data.mensajes || []);
  } catch(e) {
    document.getElementById('chat-hilo').innerHTML =
      '<div style="padding:20px;color:#a32d2d;font-size:13px">Error al cargar mensajes.</div>';
  }
}

// ── RENDER HILO ───────────────────────────────────────────────────────────────
function renderHilo(mensajes) {
  var hilo = document.getElementById('chat-hilo');

  if (!mensajes.length) {
    hilo.innerHTML = '<div style="text-align:center;padding:30px;color:var(--suave);font-size:13px">Sin mensajes aún.</div>';
    return;
  }

  hilo.innerHTML = mensajes.map(function(m) {
    var esTEA = m.autor === 'TEA';
    var cls   = esTEA ? 'msg-tea' : 'msg-estudiante';
    var autorLabel = esTEA ? 'TEA · ' + m.fecha : 'Estudiante · ' + m.fecha;
    var adjHtml = renderAdjMsg(m.adjuntos || [], esTEA);
    return '<div class="msg-burbuja ' + cls + '">' +
      '<span class="msg-autor">' + autorLabel + '</span>' +
      '<div class="msg-rich">' + mdAHtml(m.contenido || '') + '</div>' +
      adjHtml +
      '</div>';
  }).join('');

  // Scroll al último mensaje
  hilo.scrollTop = hilo.scrollHeight;
}

function renderAdjMsg(adjs, esTEA) {
  if (!adjs || !adjs.length) return '';
  var chipCls = esTEA ? 'adj-chip-tea' : 'adj-chip-est';
  var h = '<div class="adj-wrap">';
  adjs.forEach(function(a) {
    var esImg = a.tipo && a.tipo.startsWith('image/');
    if (esImg && a.miniatura) {
      h += '<a href="' + a.url + '" target="_blank"><img class="adj-img-prev" src="' + a.miniatura + '" alt="' + esc(a.nombre) + '"/></a>';
    } else {
      h += '<a class="adj-chip ' + chipCls + '" href="' + a.url + '" target="_blank">' +
           '<span>' + adjIcon(a.tipo) + '</span>' +
           '<span class="adj-nombre">' + esc(a.nombre) + '</span></a>';
    }
  });
  return h + '</div>';
}

// ── CAMBIAR ESTADO ────────────────────────────────────────────────────────────
async function cambiarEstado(nuevoEstado) {
  if (!ticketActual) return;
  try {
    var res  = await fetch(API + '?action=admin_estado', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ ticketId: ticketActual.id, estado: nuevoEstado }),
    });
    var data = await res.json();
    if (!data.ok) throw new Error(data.error);
    ticketActual.estado = nuevoEstado;
    // Actualizar en la lista local
    var t = todosTickets.find(function(x){ return x.id === ticketActual.id; });
    if (t) t.estado = nuevoEstado;
    // Re-render lista con filtros actuales
    filtrar();
    // Actualizar badge en sidebar del ticket activo
    var ti = document.getElementById('ti-' + ticketActual.id);
    if (ti) {
      var badge = ti.querySelector('.tk-status');
      if (badge) {
        badge.className = 'tk-status ' + (SC[nuevoEstado]||'ts-abierto');
        badge.textContent = nuevoEstado;
      }
      ti.classList.add('active');
    }
    actualizarAreaReply(nuevoEstado);
  } catch(e) {
    alert('Error al cambiar estado: ' + e.message);
    // Revertir selector
    document.getElementById('estado-sel').value = ticketActual.estado;
  }
}

function actualizarAreaReply(estado) {
  var cerrado = estado === 'Cerrado';
  document.getElementById('quill-admin').style.display    = cerrado ? 'none' : 'block';
  document.querySelector('.adj-zona').style.display       = cerrado ? 'none' : 'flex';
  document.querySelector('.reply-row').style.display      = cerrado ? 'none' : 'flex';
  document.getElementById('cerrado-banner').style.display = cerrado ? 'block' : 'none';
  document.querySelector('.reply-label').style.display    = cerrado ? 'none' : 'block';
}

// ── ADJUNTOS ──────────────────────────────────────────────────────────────────
function adjIcon(tipo) {
  if (!tipo) return '📎';
  if (tipo.startsWith('image/'))  return '🖼️';
  if (tipo.includes('pdf'))       return '📄';
  if (tipo.includes('word')||tipo.includes('document')) return '📝';
  if (tipo.includes('sheet')||tipo.includes('excel'))   return '📊';
  if (tipo.includes('zip')||tipo.includes('rar'))       return '🗜️';
  return '📎';
}

function agregarAdj(files) {
  Array.from(files).forEach(function(f) {
    if (adjuntos.length >= 5) { alert('Máximo 5 archivos.'); return; }
    if (f.size > 10*1024*1024) { alert(f.name + ' supera 10 MB.'); return; }
    adjuntos.push(f);
  });
  renderAdjPreview();
}

function renderAdjPreview() {
  var el = document.getElementById('adj-admin-list');
  el.innerHTML = adjuntos.map(function(f, i) {
    return '<div class="adj-prev-item"><span>' + adjIcon(f.type) + '</span>' +
      '<span style="max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + esc(f.name) + '</span>' +
      '<button onclick="quitarAdj(' + i + ')" title="Quitar">✕</button></div>';
  }).join('');
}

function quitarAdj(i) { adjuntos.splice(i,1); renderAdjPreview(); }

async function subirArchivo(file) {
  var fd = new FormData();
  fd.append('file', file);
  fd.append('upload_preset', CLOUDINARY_PRESET);
  fd.append('public_id', 'helpdesk/' + Date.now() + '_' + file.name.replace(/[^a-zA-Z0-9._-]/g,'_'));
  var res = await fetch('https://api.cloudinary.com/v1_1/' + CLOUDINARY_CLOUD + '/auto/upload', {method:'POST',body:fd});
  if (!res.ok) throw new Error('Upload ' + res.status);
  var d = await res.json();
  return { url: d.secure_url, nombre: file.name, tipo: file.type };
}

// ── ENVIAR RESPUESTA ──────────────────────────────────────────────────────────
async function enviarRespuesta() {
  if (!ticketActual) return;
  var html  = quillAdmin ? quillAdmin.root.innerHTML : '';
  var texto = quillAdmin ? quillAdmin.getText().trim() : '';
  var ok    = document.getElementById('rep-ok');
  var err   = document.getElementById('rep-err');
  ok.style.display = 'none'; err.style.display = 'none';

  if (!texto && adjuntos.length === 0) {
    err.textContent = 'Escribe algo o adjunta un archivo.';
    err.style.display = 'block'; return;
  }

  var btn = document.getElementById('btn-send');
  btn.disabled = true; btn.textContent = 'Enviando...';

  try {
    // Subir adjuntos a Cloudinary
    var adjSubidos = [];
    for (var j = 0; j < adjuntos.length; j++) {
      adjSubidos.push(await subirArchivo(adjuntos[j]));
    }

    var res = await fetch(API + '?action=admin_responder', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        ticketId:         ticketActual.id,
        contenido:        html,
        adjuntos:         adjSubidos,
        tema:             ticketActual.tema,
        nombreEstudiante: ticketActual.nombre,
        emailEstudiante:  ticketActual.email,
      }),
    });
    var data = await res.json();
    if (!data.ok) throw new Error(data.error);

    // Actualizar estado local a Respondido
    ticketActual.estado = 'Respondido';
    var t = todosTickets.find(function(x){ return x.id === ticketActual.id; });
    if (t) t.estado = 'Respondido';
    document.getElementById('estado-sel').value = 'Respondido';
    actualizarAreaReply('Respondido');
    filtrar();

    // Limpiar editor
    if (quillAdmin) quillAdmin.setContents([]);
    adjuntos = []; renderAdjPreview();

    ok.style.display = 'block';
    setTimeout(function(){ ok.style.display = 'none'; }, 3000);

    // Recargar hilo
    var r2   = await fetch(API + '?action=helpdesk_mensajes&ticketId=' + ticketActual.id);
    var d2   = await r2.json();
    renderHilo(d2.mensajes || []);

  } catch(e) {
    err.textContent = 'Error: ' + e.message;
    err.style.display = 'block';
  } finally {
    btn.disabled = false; btn.textContent = 'Enviar respuesta';
  }
}

// ── UTILIDADES ────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function mdAHtml(texto) {
  if (!texto) return '';
  if (/^\s*</.test(texto) || /<(p|div|strong|em|ul|ol|h[1-6]|blockquote|pre|code)\b/i.test(texto)) return texto;
  return texto
    .replace(/```([\s\S]*?)```/g, function(_,c){ return '<pre><code>'+c.trim()+'</code></pre>'; })
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/^#{3}\s+(.+)$/gm,'<h3>$1</h3>')
    .replace(/^#{2}\s+(.+)$/gm,'<h2>$1</h2>')
    .replace(/^#{1}\s+(.+)$/gm,'<h1>$1</h1>')
    .replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/_([^_]+)_/g,'<em>$1</em>')
    .replace(/~~(.+?)~~/g,'<s>$1</s>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank">$1</a>')
    .replace(/^>\s+(.+)$/gm,'<blockquote>$1</blockquote>')
    .replace(/^\d+\.\s+(.+)$/gm,'<li>$1</li>')
    .replace(/^[-*]\s+(.+)$/gm,'<li>$1</li>')
    .replace(/(<li>[\s\S]+?<\/li>)(\n(?!<li>)|$)/g,'<ul>$1</ul>')
    .replace(/^(?!<[a-z])(.*\S.*)$/gm,'<p>$1</p>')
    .replace(/<p>\s*<\/p>/g,'');
}

function cerrarMobile() {
  document.getElementById('main-ticket').style.display = 'none';
  document.getElementById('main-empty').style.display  = 'flex';
}</script>
